<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" style="position:fixed;top:50%;left:0;width:100%;height:50%;">
    <defs>
        <linearGradient id="wave-gradient-1" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#1100ff;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#0d00fa;stop-opacity:0.5" />
        </linearGradient>
        <linearGradient id="wave-gradient-2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#1500ff;stop-opacity:0.25" />
            <stop offset="100%" style="stop-color:#1100ff;stop-opacity:0.4" />
        </linearGradient>
        <linearGradient id="wave-gradient-3" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#1700ff;stop-opacity:0.2" />
            <stop offset="100%" style="stop-color:#1300f8;stop-opacity:0.35" />
        </linearGradient>
    </defs>
    <style>
        .ocean-wave {
            opacity: 0.6;
        }
        .wave1 { animation: wave1 25s ease-in-out infinite; }
        .wave2 { animation: wave2 20s ease-in-out infinite; }
        .wave3 { animation: wave3 30s ease-in-out infinite; }
        .wave4 { animation: wave4 22s ease-in-out infinite; }
        .wave5 { animation: wave5 28s ease-in-out infinite; }
        .wave6 { animation: wave6 24s ease-in-out infinite; }
        @keyframes wave1 {
            0%, 100% {
                transform: translateX(0) translateY(0);
                opacity: 0.4;
            }
            50% {
                transform: translateX(-3%) translateY(-1%);
                opacity: 0.6;
            }
        }
        @keyframes wave2 {
            0%, 100% {
                transform: translateX(0) translateY(0);
                opacity: 0.35;
            }
            50% {
                transform: translateX(4%) translateY(1%);
                opacity: 0.55;
            }
        }
        @keyframes wave3 {
            0%, 100% {
                transform: translateX(0) translateY(0);
                opacity: 0.3;
            }
            50% {
                transform: translateX(-2%) translateY(-0.5%);
                opacity: 0.5;
            }
        }
        @keyframes wave4 {
            0%, 100% {
                transform: translateX(0) translateY(0);
                opacity: 0.38;
            }
            50% {
                transform: translateX(3%) translateY(0.8%);
                opacity: 0.58;
            }
        }
        @keyframes wave5 {
            0%, 100% {
                transform: translateX(0) translateY(0);
                opacity: 0.33;
            }
            50% {
                transform: translateX(-4%) translateY(-0.7%);
                opacity: 0.53;
            }
        }
        @keyframes wave6 {
            0%, 100% {
                transform: translateX(0) translateY(0);
                opacity: 0.36;
            }
            50% {
                transform: translateX(2.5%) translateY(0.6%);
                opacity: 0.56;
            }
        }
    </style>
    <!-- Wave Layer 1 (Bottom) -->
    <path class="ocean-wave wave1" fill="url(#wave-gradient-1)" d="M -10 70 Q 15 65, 30 70 T 70 70 T 110 70 L 110 110 L -10 110 Z">
        <animate attributeName="d" dur="25s" repeatCount="indefinite"
                 values="M -10 70 Q 15 65, 30 70 T 70 70 T 110 70 L 110 110 L -10 110 Z;
                         M -10 70 Q 15 75, 30 70 T 70 70 T 110 70 L 110 110 L -10 110 Z;
                         M -10 72 Q 15 68, 30 72 T 70 72 T 110 72 L 110 110 L -10 110 Z;
                         M -10 70 Q 15 65, 30 70 T 70 70 T 110 70 L 110 110 L -10 110 Z"/>
    </path>
    <!-- Wave Layer 2 -->
    <path class="ocean-wave wave2" fill="url(#wave-gradient-2)" d="M -10 55 Q 20 50, 40 55 T 80 55 T 110 55 L 110 110 L -10 110 Z">
        <animate attributeName="d" dur="20s" repeatCount="indefinite"
                 values="M -10 55 Q 20 50, 40 55 T 80 55 T 110 55 L 110 110 L -10 110 Z;
                         M -10 55 Q 20 60, 40 55 T 80 55 T 110 55 L 110 110 L -10 110 Z;
                         M -10 57 Q 20 53, 40 57 T 80 57 T 110 57 L 110 110 L -10 110 Z;
                         M -10 55 Q 20 50, 40 55 T 80 55 T 110 55 L 110 110 L -10 110 Z"/>
    </path>
    <!-- Wave Layer 3 -->
    <path class="ocean-wave wave3" fill="url(#wave-gradient-3)" d="M -10 40 Q 25 35, 50 40 T 90 40 T 110 40 L 110 110 L -10 110 Z">
        <animate attributeName="d" dur="30s" repeatCount="indefinite"
                 values="M -10 40 Q 25 35, 50 40 T 90 40 T 110 40 L 110 110 L -10 110 Z;
                         M -10 40 Q 25 45, 50 40 T 90 40 T 110 40 L 110 110 L -10 110 Z;
                         M -10 42 Q 25 38, 50 42 T 90 42 T 110 42 L 110 110 L -10 110 Z;
                         M -10 40 Q 25 35, 50 40 T 90 40 T 110 40 L 110 110 L -10 110 Z"/>
    </path>
    <!-- Wave Layer 4 (Mid) -->
    <path class="ocean-wave wave4" fill="#1100ff" opacity="0.25" d="M -10 30 Q 18 27, 36 30 T 72 30 T 110 30 L 110 110 L -10 110 Z">
        <animate attributeName="d" dur="22s" repeatCount="indefinite"
                 values="M -10 30 Q 18 27, 36 30 T 72 30 T 110 30 L 110 110 L -10 110 Z;
                         M -10 30 Q 18 33, 36 30 T 72 30 T 110 30 L 110 110 L -10 110 Z;
                         M -10 32 Q 18 29, 36 32 T 72 32 T 110 32 L 110 110 L -10 110 Z;
                         M -10 30 Q 18 27, 36 30 T 72 30 T 110 30 L 110 110 L -10 110 Z"/>
    </path>
    <!-- Wave Layer 5 -->
    <path class="ocean-wave wave5" fill="#0f00f5" opacity="0.2" d="M -10 20 Q 22 17, 44 20 T 84 20 T 110 20 L 110 110 L -10 110 Z">
        <animate attributeName="d" dur="28s" repeatCount="indefinite"
                 values="M -10 20 Q 22 17, 44 20 T 84 20 T 110 20 L 110 110 L -10 110 Z;
                         M -10 20 Q 22 23, 44 20 T 84 20 T 110 20 L 110 110 L -10 110 Z;
                         M -10 22 Q 22 19, 44 22 T 84 22 T 110 22 L 110 110 L -10 110 Z;
                         M -10 20 Q 22 17, 44 20 T 84 20 T 110 20 L 110 110 L -10 110 Z"/>
    </path>
    <!-- Wave Layer 6 (Top) -->
    <path class="ocean-wave wave6" fill="#1500ff" opacity="0.18" d="M -10 10 Q 28 7, 56 10 T 96 10 T 110 10 L 110 110 L -10 110 Z">
        <animate attributeName="d" dur="24s" repeatCount="indefinite"
                 values="M -10 10 Q 28 7, 56 10 T 96 10 T 110 10 L 110 110 L -10 110 Z;
                         M -10 10 Q 28 13, 56 10 T 96 10 T 110 10 L 110 110 L -10 110 Z;
                         M -10 12 Q 28 9, 56 12 T 96 12 T 110 12 L 110 110 L -10 110 Z;
                         M -10 10 Q 28 7, 56 10 T 96 10 T 110 10 L 110 110 L -10 110 Z"/>
    </path>
    <!-- Surface shimmer lines -->
    <path class="ocean-wave wave1" fill="none" stroke="#1700ff" stroke-width="0.3" opacity="0.3" d="M -10 8 Q 30 6, 60 8 T 110 8">
        <animate attributeName="d" dur="25s" repeatCount="indefinite"
                 values="M -10 8 Q 30 6, 60 8 T 110 8;
                         M -10 8 Q 30 10, 60 8 T 110 8;
                         M -10 9 Q 30 7, 60 9 T 110 9;
                         M -10 8 Q 30 6, 60 8 T 110 8"/>
    </path>
    <path class="ocean-wave wave3" fill="none" stroke="#1300f8" stroke-width="0.2" opacity="0.25" d="M -10 15 Q 35 13, 65 15 T 110 15">
        <animate attributeName="d" dur="30s" repeatCount="indefinite"
                 values="M -10 15 Q 35 13, 65 15 T 110 15;
                         M -10 15 Q 35 17, 65 15 T 110 15;
                         M -10 16 Q 35 14, 65 16 T 110 16;
                         M -10 15 Q 35 13, 65 15 T 110 15"/>
    </path>
</svg>