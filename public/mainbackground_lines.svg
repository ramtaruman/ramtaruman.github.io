<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" style="position:fixed;top:0;left:0;width:100%;height:100%;">
    <style>
        .contour-line {
            fill: none;
            stroke-width: 0.3;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 2 1;
        }
        .line1 { stroke: #1100ff; animation: flow1 14s ease-in-out infinite; }
        .line2 { stroke: #1a0aee; animation: flow2 11s ease-in-out infinite; }
        .line3 { stroke: #0f00f5; animation: flow3 16s ease-in-out infinite; }
        .line4 { stroke: #1500ff; animation: flow4 13s ease-in-out infinite; }
        .line5 { stroke: #0d00fa; animation: flow5 15s ease-in-out infinite; }
        .line6 { stroke: #1300f8; animation: flow6 12s ease-in-out infinite; }
        .line7 { stroke: #1700ff; animation: flow7 17s ease-in-out infinite; }
        .line8 { stroke: #1000f0; animation: flow8 14.5s ease-in-out infinite; }
        @keyframes flow1 {
            0% { stroke-dashoffset: 0; opacity: 0.6; transform: translateX(0); }
            50% { stroke-dashoffset: 8; opacity: 0.4; transform: translateX(1px); }
            100% { stroke-dashoffset: 0; opacity: 0.6; transform: translateX(0); }
        }
        @keyframes flow2 {
            0% { stroke-dashoffset: 0; opacity: 0.5; transform: translateY(0); }
            50% { stroke-dashoffset: -6; opacity: 0.35; transform: translateY(-0.5px); }
            100% { stroke-dashoffset: 0; opacity: 0.5; transform: translateY(0); }
        }
        @keyframes flow3 {
            0% { stroke-dashoffset: 0; opacity: 0.55; transform: translate(0, 0); }
            50% { stroke-dashoffset: 10; opacity: 0.3; transform: translate(-0.8px, 0.5px); }
            100% { stroke-dashoffset: 0; opacity: 0.55; transform: translate(0, 0); }
        }
        @keyframes flow4 {
            0% { stroke-dashoffset: 0; opacity: 0.5; transform: translateX(0); }
            50% { stroke-dashoffset: -7; opacity: 0.4; transform: translateX(0.8px); }
            100% { stroke-dashoffset: 0; opacity: 0.5; transform: translateX(0); }
        }
        @keyframes flow5 {
            0% { stroke-dashoffset: 0; opacity: 0.6; transform: scale(1); }
            50% { stroke-dashoffset: 9; opacity: 0.35; transform: scale(1.01); }
            100% { stroke-dashoffset: 0; opacity: 0.6; transform: scale(1); }
        }
        @keyframes flow6 {
            0% { stroke-dashoffset: 0; opacity: 0.55; transform: translateY(0); }
            50% { stroke-dashoffset: -8; opacity: 0.4; transform: translateY(0.8px); }
            100% { stroke-dashoffset: 0; opacity: 0.55; transform: translateY(0); }
        }
        @keyframes flow7 {
            0% { stroke-dashoffset: 0; opacity: 0.5; transform: translateX(0); }
            50% { stroke-dashoffset: 11; opacity: 0.3; transform: translateX(-0.5px); }
            100% { stroke-dashoffset: 0; opacity: 0.5; transform: translateX(0); }
        }
        @keyframes flow8 {
            0% { stroke-dashoffset: 0; opacity: 0.6; transform: scale(1); }
            50% { stroke-dashoffset: -9; opacity: 0.35; transform: scale(0.99); }
            100% { stroke-dashoffset: 0; opacity: 0.6; transform: scale(1); }
        }
    </style>
    <path class="contour-line line1" d="M -10 30 Q 25 10, 50 30 T 110 30">
        <animate attributeName="d" dur="14s" repeatCount="indefinite"
                 values="M -10 30 Q 25 10, 50 30 T 110 30;
                         M -10 30 Q 23 42, 50 28 T 110 32;
                         M -10 31 Q 27 15, 50 31 T 110 29;
                         M -10 30 Q 25 10, 50 30 T 110 30"/>
    </path>
    <path class="contour-line line2" d="M -5 50 C 20 20, 45 80, 70 50 S 105 50, 110 50">
        <animate attributeName="d" dur="11s" repeatCount="indefinite"
                 values="M -5 50 C 20 20, 45 80, 70 50 S 105 50, 110 50;
                         M -5 51 C 22 65, 43 35, 70 51 S 105 49, 110 51;
                         M -5 49 C 19 28, 46 72, 71 49 S 106 51, 110 49;
                         M -5 50 C 20 20, 45 80, 70 50 S 105 50, 110 50"/>
    </path>
    <path class="contour-line line3" d="M 10 -5 Q 30 35, 50 15 T 90 -5">
        <animate attributeName="d" dur="16s" repeatCount="indefinite"
                 values="M 10 -5 Q 30 35, 50 15 T 90 -5;
                         M 10 -5 Q 28 22, 52 18 T 90 -4;
                         M 11 -5 Q 32 30, 49 14 T 89 -5;
                         M 10 -5 Q 30 35, 50 15 T 90 -5"/>
    </path>
    <path class="contour-line line4" d="M -10 70 C 15 45, 35 95, 60 70 T 110 70">
        <animate attributeName="d" dur="13s" repeatCount="indefinite"
                 values="M -10 70 C 15 45, 35 95, 60 70 T 110 70;
                         M -10 71 C 17 78, 33 62, 60 71 T 110 69;
                         M -10 69 C 14 52, 36 88, 61 69 T 110 71;
                         M -10 70 C 15 45, 35 95, 60 70 T 110 70"/>
    </path>
    <path class="contour-line line5" d="M 20 105 Q 40 65, 60 85 T 100 105">
        <animate attributeName="d" dur="15s" repeatCount="indefinite"
                 values="M 20 105 Q 40 65, 60 85 T 100 105;
                         M 20 105 Q 38 78, 62 82 T 100 105;
                         M 21 105 Q 42 70, 59 86 T 99 105;
                         M 20 105 Q 40 65, 60 85 T 100 105"/>
    </path>
    <path class="contour-line line6" d="M -5 15 C 30 -5, 50 40, 75 15 S 110 15, 115 15">
        <animate attributeName="d" dur="12s" repeatCount="indefinite"
                 values="M -5 15 C 30 -5, 50 40, 75 15 S 110 15, 115 15;
                         M -5 16 C 32 28, 48 12, 75 16 S 110 14, 115 16;
                         M -5 14 C 29 2, 51 33, 76 14 S 110 16, 115 14;
                         M -5 15 C 30 -5, 50 40, 75 15 S 110 15, 115 15"/>
    </path>
    <path class="contour-line line7" d="M -10 85 Q 20 105, 55 85 T 110 85">
        <animate attributeName="d" dur="17s" repeatCount="indefinite"
                 values="M -10 85 Q 20 105, 55 85 T 110 85;
                         M -10 86 Q 18 92, 55 87 T 110 84;
                         M -10 84 Q 22 98, 54 84 T 110 86;
                         M -10 85 Q 20 105, 55 85 T 110 85"/>
    </path>
    <path class="contour-line line8" d="M 5 50 C 25 25, 50 75, 75 50 S 100 25, 105 50">
        <animate attributeName="d" dur="14.5s" repeatCount="indefinite"
                 values="M 5 50 C 25 25, 50 75, 75 50 S 100 25, 105 50;
                         M 5 51 C 27 58, 48 42, 75 51 S 100 62, 105 49;
                         M 5 49 C 24 32, 51 68, 76 49 S 100 33, 105 51;
                         M 5 50 C 25 25, 50 75, 75 50 S 100 25, 105 50"/>
    </path>
</svg>